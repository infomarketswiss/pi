name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  sync-upstream:
    name: Sync Fork with Upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push synced commits to the repository
    steps:
      - name: Sync Fork
        run: |
          gh repo sync ${{ github.repository }} --source earendil-works/pi --branch main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
